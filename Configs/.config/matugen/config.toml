# input_path = '~/.config/matugen/templates/nvim.lua'
# output_path = '~/.config/nvim/lua/core/config/colors.lua'

[templates.btop]
input_path = '~/.config/matugen/templates/btop'
output_path = '~/.config/btop/themes/colors.theme'
