      C20 40.5 22.5 43.5 27 43.5
      C29 43.5 31 41.5 31 39.5
      C31 37 28.5 35 25 35
      C22 35 19.5 37.5 19.5 40.5
      C19.5 43 21.5 45 25 45
      H43
      C46 45 48 42.5 48 39
      C48 34 44 30 39 30
      C35 25.5 29 23 23 23
      C17 23 14 26.5 14 33
