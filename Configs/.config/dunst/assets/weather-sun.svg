<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3B0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
  </defs>
  <!-- Warm glow aura -->
  <circle cx="32" cy="32" r="26" fill="url(#sunGlow)" opacity="0.4"/>
  <circle cx="32" cy="32" r="22" fill="url(#sunGlow)" opacity="0.3"/>
  <!-- Sun body with gentle gradient -->
  <circle cx="32" cy="32" r="16" fill="url(#sunCore)"/>
  <!-- Subtle facial warmth - closed content eyes -->
  <g fill="#E6A600" opacity="0.9">
    <ellipse cx="24" cy="28" rx="3" ry="1.5" transform="rotate(-15 24 28)"/>
    <ellipse cx="40" cy="28" rx="3" ry="1.5" transform="rotate(15 40 28)"/>
  </g>
  <!-- Tiny smile -->
  <path d="M26 38 Q32 42 38 38" stroke="#E6A600" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Rays with life - slightly uneven, organic -->
  <g stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="32" y1="6" x2="32" y2="13"/>
    <line x1="32" y1="51" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="13" y2="32"/>
    <line x1="51" y1="32" x2="58" y2="32"/>
    <line x1="11" y1="11" x2="17" y2="17"/>
    <line x1="47" y1="47" x2="53" y2="53"/>
    <line x1="11" y1="53" x2="17" y2="47"/>
    <line x1="47" y1="17" x2="53" y2="11"/>
  </g>
  <!-- Tiny sparkles of joy -->
  <g fill="#FFFDE7" opacity="0.9">
    <circle cx="14" cy="14" r="1.2"/>
    <circle cx="50" cy="50" r="1"/>
    <circle cx="14" cy="50" r="0.8"/>
    <circle cx="50" cy="14" r="1"/>
  </g>
</svg>