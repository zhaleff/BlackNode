<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F4FF" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#A8C0E8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6B8DD6" stop-opacity="0.1"/>
