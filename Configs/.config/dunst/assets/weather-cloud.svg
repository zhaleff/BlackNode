    <path d="M14 42
      C14 46 17 49 21 49
      H43
      C47 49 50 46 50 42
      C50 36.5 45.5 32 40 32
      C37 28 32 25 28 25
      C22 25 18 28 18 33
      C18 37.5 21 41 26 41
      C28 41 30 39 30 37
      C30 34 27 32 23 32
      C19 32 16 35 16 39
      C16 42 18 44 22 44
      H42
      C46 44 48 41.5 48 37
      C48 31.5 43.5 27 38 27
      C34 22 28 20 22 20
      C16 20 14 23.5 14 30
      Z" fill="url(#cloudBody)"/>
  </g>
  <!-- Gentle face - thoughtful, watching -->
  <g fill="#5D7A9A" opacity="0.7">
    <ellipse cx="26" cy="32" rx="2.5" ry="1.2" transform="rotate(-10 26 32)"/>
    <ellipse cx="38" cy="31" rx="2.5" ry="1.2" transform="rotate(10 38 31)"/>
  </g>
  <path d="M28 39 Q32 41.5 36 39" stroke="#5D7A9A" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Little blush marks -->
  <g fill="#A8C0E8" opacity="0.5">
    <ellipse cx="21" cy="35" rx="3" ry="1.5"/>
    <ellipse cx="43" cy="35" rx="3" ry="1.5"/>
  </g>
</svg>