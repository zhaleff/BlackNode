<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="heavyRainCloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6A7A8A"/>
      <stop offset="50%" stop-color="#5A6A7A"/>
      <stop offset="100%" stop-color="#4A5A6A"/>
    </linearGradient>
    <filter id="rainShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3A4A5A" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#rainShadow)">
    <path d="M10 42c0 2.2 1.8 4 4 4h36c2.2 0 4-1.8 4-4v-6H10v6z" fill="url(#heavyRainCloud)"/>
    <path d="M18 28c0-5.5 4.5-10 10-10s10 4.5 10 10c0 1.8-0.6 3.5-1.6 4.8l2 2c1.1-1.3 1.8-3 1.8-4.8 0-6.6-5.4-12-12-12S18 22.5 18 29c0 1.8 0.6 3.5 1.6 4.8l2 2C20 33 18 30.5 18 28z" fill="url(#heavyRainCloud)"/>
  </g>
  <!-- Intense rain - sheets of water -->
  <g stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="16" y1="46" x2="13" y2="54"/>
    <line x1="22" y1="45" x2="19" y2="53"/>
    <line x1="28" y1="46" x2="25" y2="54"/>
    <line x1="34" y1="45" x2="31" y2="53"/>
    <line x1="40" y1="46" x2="37" y2="54"/>
    <line x1="46" y1="45" x2="43" y2="53"/>
    <line x1="14" y1="49" x2="11" y2="57"/>
    <line x1="20" y1="48" x2="17" y2="56"/>
    <line x1="26" y1="49" x2="23" y2="57"/>
    <line x1="32" y1="48" x2="29" y2="56"/>
    <line x1="38" y1="49" x2="35" y2="57"/>
    <line x1="44" y1="48" x2="41" y2="56"/>
    <line x1="12" y1="52" x2="9" y2="60"/>
    <line x1="18" y1="51" x2="15" y2="59"/>
    <line x1="24" y1="52" x2="21" y2="60"/>
    <line x1="30" y1="51" x2="27" y2="59"/>
    <line x1="36" y1="52" x2="33" y2="60"/>
    <line x1="42" y1="51" x2="39" y2="59"/>
  </g>
  <!-- Mist at ground level -->
  <g fill="#FFFFFF" opacity="0.15">
    <ellipse cx="32" cy="56" rx="28" ry="3"/>
    <ellipse cx="32" cy="58" rx="24" ry="2"/>
  </g>
  <!-- Face - steady, enduring, "this too shall pass" -->
  <g fill="#3D6B9E" opacity="0.85">
    <ellipse cx="25" cy="32" rx="2.5" ry="1" transform="rotate(-10 25 32)"/>
    <ellipse cx="39" cy="31" rx="2.5" ry="1" transform="rotate(10 39 31)"/>
  </g>
  <path d="M27 38.5 Q32 37 37 38.5" stroke="#3D6B9E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Water droplets on face - solidarity -->
  <g fill="#4A90D9" opacity="0.7">
    <ellipse cx="21" cy="36" rx="1.2" ry="0.7"/>
    <ellipse cx="43" cy="35" rx="1" ry="0.6"/>
    <ellipse cx="26" cy="38" rx="0.8" ry="0.5"/>
    <ellipse cx="38" cy="37" rx="0.9" ry="0.5"/>
  </g>
  <!-- Protective glimmer -->
  <g fill="#FFFFFF" opacity="0.4">
    <circle cx="16" cy="34" r="0.8"/>
    <circle cx="48" cy="32" r="0.6"/>
    <circle cx="22" cy="42" r="0.5"/>
    <circle cx="42" cy="40" r="0.7"/>
  </g>
</svg>