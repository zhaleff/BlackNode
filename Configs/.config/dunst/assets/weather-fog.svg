<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fogCloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#D0D8E0"/>
    </linearGradient>
  </defs>
  <!-- Layers of mist - soft, enveloping -->
  <g fill="url(#fogCloud)" opacity="0.85">
    <ellipse cx="32" cy="38" rx="26" ry="10"/>
    <ellipse cx="32" cy="30" rx="22" ry="9"/>
    <ellipse cx="32" cy="24" rx="18" ry="8"/>
    <ellipse cx="32" cy="18" rx="14" ry="7"/>
  </g>
  <!-- Even softer layers -->
  <g fill="#FFFFFF" opacity="0.5">
    <ellipse cx="32" cy="40" rx="28" ry="11"/>
    <ellipse cx="32" cy="32" rx="24" ry="10"/>
    <ellipse cx="32" cy="25" rx="20" ry="8"/>
  </g>
  <g fill="#FFFFFF" opacity="0.3">
    <ellipse cx="32" cy="42" rx="30" ry="12"/>
    <ellipse cx="32" cy="34" rx="26" ry="10"/>
  </g>
  <!-- Subtle swirls suggesting movement -->
  <g stroke="#B0C4DE" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M18 36 Q26 32 34 36 Q42 40 46 36"/>
    <path d="M16 42 Q24 39 32 42 Q40 45 48 42"/>
    <path d="M20 30 Q28 27 36 30 Q44 33 50 30"/>
  </g>
  <!-- Face - gentle, mysterious, "I'm here" -->
  <g fill="#8A9BB8" opacity="0.7">
    <ellipse cx="26" cy="30" rx="2.5" ry="1.2" transform="rotate(-15 26 30)"/>
    <ellipse cx="38" cy="29" rx="2.5" ry="1.2" transform="rotate(15 38 29)"/>
  </g>
  <path d="M28 35 Q32 37.5 36 35" stroke="#8A9BB8" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Tiny sparkles in the mist -->
  <g fill="#A8B8D0" opacity="0.6">
    <circle cx="20" cy="28" r="1"/>
    <circle cx="44" cy="26" r="0.8"/>
    <circle cx="24" cy="40" r="0.7"/>
    <circle cx="40" cy="42" r="0.6"/>
    <circle cx="14" cy="34" r="0.5"/>
    <circle cx="50" cy="32" r="0.7"/>
  </g>
</svg>