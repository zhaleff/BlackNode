    <ellipse cx="38" cy="33" rx="2.5" ry="1" transform="rotate(10 38 33)"/>
  </g>
  <path d="M28 39 Q32 41.5 36 39" stroke="#8A9BB8" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
