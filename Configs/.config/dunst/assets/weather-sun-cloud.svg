      <stop offset="0%" stop-color="#FFF3B0" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="scSunCore" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
  </defs>
  <!-- Sun peeking from behind cloud -->
  <circle cx="46" cy="18" r="14" fill="url(#scSunGlow)" opacity="0.5"/>
  <circle cx="46" cy="18" r="12" fill="url(#scSunCore)"/>
  <!-- Cloud -->
  <defs>
