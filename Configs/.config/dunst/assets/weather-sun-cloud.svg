      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="50%" stop-color="#DCE4EC"/>
      <stop offset="100%" stop-color="#C8D4E0"/>
    </linearGradient>
  </defs>
  <path d="M10 42c0 2.2 1.8 4 4 4h36c2.2 0 4-1.8 4-4v-6H10v6z" fill="url(#scCloud)"/>
  <path d="M18 28c0-5.5 4.5-10 10-10s10 4.5 10 10c0 1.8-0.6 3.5-1.6 4.8l2 2c1.1-1.3 1.8-3 1.8-4.8 0-6.6-5.4-12-12-12S18 22.4 18 29c0 1.8 0.7 3.5 1.8 4.8L18 28z" fill="#DCE4EC"/>
