  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="30" x2="52" y2="34"/>
    <line x1="54" y1="18" x2="57" y2="20"/>
    <line x1="42" y1="20" x2="39" y2="22"/>
