<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="heatCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="50%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </radialGradient>
    <radialGradient id="heatGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A65" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FF7043" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E64A19" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  <!-- Radiant heat aura -->
  <circle cx="32" cy="32" r="28" fill="url(#heatGlow)"/>
  <circle cx="32" cy="32" r="22" fill="url(#heatGlow)" opacity="0.6"/>
  <!-- Sun body - warm, not aggressive -->
  <circle cx="32" cy="32" r="15" fill="url(#heatCore)"/>
  <!-- Face - tired but caring, "stay hydrated" -->
  <g fill="#E65C00" opacity="0.9">
    <ellipse cx="25" cy="28" rx="2.8" ry="1.2" transform="rotate(-20 25 28)"/>
    <ellipse cx="39" cy="28" rx="2.8" ry="1.2" transform="rotate(20 39 28)"/>
  </g>
  <!-- Gentle concerned mouth -->
  <path d="M27 39 Q32 36 37 39" stroke="#E65C00" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Heat rays - wavy, shimmering -->
  <g stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round" opacity="0.7" fill="none">
    <path d="M32 5 Q30 8 32 12 Q34 8 32 5"/>
    <path d="M32 52 Q30 49 32 45 Q34 49 32 52"/>
    <path d="M5 32 Q8 30 12 32 Q8 34 5 32"/>
    <path d="M52 32 Q49 30 45 32 Q49 34 52 32"/>
    <path d="M9 9 Q11.5 11.5 15 15 Q11.5 11.5 9 9"/>
    <path d="M49 49 Q46.5 46.5 42 42 Q46.5 46.5 49 49"/>
    <path d="M9 49 Q11.5 46.5 15 42 Q11.5 46.5 9 49"/>
    <path d="M49 9 Q46.5 11.5 42 15 Q46.5 11.5 49 9"/>
  </g>
  <!-- Shimmering heat haze -->
  <g fill="#FFE0B2" opacity="0.7">
    <ellipse cx="16" cy="16" rx="1.5" ry="0.8"/>
    <ellipse cx="48" cy="48" rx="1.2" ry="0.6"/>
    <ellipse cx="16" cy="48" rx="1" ry="0.5"/>
    <ellipse cx="48" cy="16" rx="1.3" ry="0.7"/>
    <ellipse cx="20" cy="8" rx="0.8" ry="0.4"/>
    <ellipse cx="44" cy="56" rx="0.6" ry="0.3"/>
  </g>
  <!-- Sweat droplet - "I feel you" -->
  <path d="M48 24 Q49 26 48 28 Q47 26 48 24" fill="#4FC3F7" opacity="0.9"/>
  <circle cx="47.5" cy="25.5" r="0.8" fill="#81D4FA" opacity="0.7"/>
</svg>