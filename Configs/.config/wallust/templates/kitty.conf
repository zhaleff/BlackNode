# project: blacknode dotfiles
# file: kitty-wallust-theme.conf
# description: kitty terminal color scheme template for wallust. wallust reads
#              your wallpaper, generates a 16-color palette and injects values
#              into {{placeholder}} variables at runtime. register this file in
#              wallust.toml and include the output from kitty.conf.
# author: zhaleff
# repository: https://github.com/zhaleff/blacknode
# license: mit
# permission is hereby granted, free of charge, to any person obtaining a copy
# of this software and associated documentation files, to deal in the software
# without restriction, including without limitation the rights to use, copy,
# modify, merge, publish, distribute, sublicense, and/or sell copies of the
# software, and to permit persons to whom the software is furnished to do so.

# text
foreground              {{foreground}}
background              {{background}}
selection_foreground    {{background}}
selection_background    {{color9}}

# cursor
cursor                  {{cursor}}
cursor_text_color       {{background}}

# urls
url_color               {{color12}}

# window borders
active_border_color     {{color13}}
inactive_border_color   {{color8}}
bell_border_color       {{color9}}

# titlebar
wayland_titlebar_color  system
macos_titlebar_color    system

# tab bar
active_tab_foreground   {{background}}
active_tab_background   {{foreground}}
inactive_tab_foreground {{foreground}}
inactive_tab_background {{background}}
tab_bar_background      {{background}}

# marks
mark1_foreground        {{background}}
mark1_background        {{color12}}
mark2_foreground        {{background}}
mark2_background        {{color13}}
mark3_foreground        {{background}}
mark3_background        {{color14}}

# normal
color0                  {{color8}}
color1                  {{color9}}
color2                  {{color10}}
color3                  {{color11}}
color4                  {{color12}}
color5                  {{color13}}
color6                  {{color14}}
color7                  {{color15}}

# bright
color8                  {{color8}}
color9                  {{color9}}
color10                 {{color10}}
color11                 {{color11}}
color12                 {{color12}}
color13                 {{color13}}
color14                 {{color14}}
color15                 {{color15}}
