# BACKGROUND
background {
    monitor =
    blur_passes = 2
    path = ~/.cache/wallust/current_wallpaper.png
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}
# GENERAL
general {
}
# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 52
    font_family = SF Pro Display Bold
    position = 0, 230
    halign = center
    valign = center
}
# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 26
    font_family = SF Pro Display Bold
    position = 0, 170
    halign = center
    valign = center
}
# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, 130
    halign = center
    valign = center
}
# Profie-Photo
image {
    monitor =
    path = $HOME/.config/hypr/vivek.png
    border_size = 2
    border_color = rgba(255, 255, 255, .65)
    size = 90
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, 20
    halign = center
    valign = center
}
# USER-BOX
shape {
    monitor =
    size = 260, 50
    color = rgba(255, 255, 255, .1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 0)
    rotate = 0
    xray = false
    position = 0, -80
    halign = center
    valign = center
}
# USER
label {
    monitor =
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    font_size = 15
    font_family = SF Pro Display Bold
    position = 0, -80
    halign = center
    valign = center
}
# INPUT FIELD
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Enter Pass</span></i>
    hide_input = false
    position = 0, -145
    halign = center
    valign = center
}
# Reboot
label {
    monitor =
    text = 󰜉
    color = rgba(255, 255, 255, 0.6)
    font_size = 36
    onclick = reboot now
    position = 0, 60
    halign = center
    valign = bottom
}
# Power off
label {
    monitor =
    text = 󰐥
    color = rgba(255, 255, 255, 0.6)
    font_size = 36
    onclick = shutdown now
    position = 580, 60
    halign = left
    valign = bottom
}
# Suspend
label {
    monitor =
    text = 󰤄
    color = rgba(255, 255, 255, 0.6)
    font_size = 36
    onclick = systemctl suspend
    position = -580, 60
    halign = right
    valign = bottom
}
