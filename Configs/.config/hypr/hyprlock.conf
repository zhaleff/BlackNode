background {
    monitor =
    path = hyprlock.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(bb, 9a, f0, 1.0)
    inner_color = rgba(1e, 1e, 2e, 1.0)
    font_color = rgba(cd, d6, f4, 1.0)
    fade_on_empty = true
    fade_timeout = 1000
    dots_rounding = -1
    cap_color = rgba(bb, 9a, f0, 1.0)
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 8
    check_color = rgba(bb, 9a, f0, 1.0)
    fail_color = rgba(f3, 8b, a8, 1.0)
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    transition_time = 200
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cd, d6, f4, 1.0)
    font_size = 96
    font_family = "JetBrains Mono Nerd Font"
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(a5, ad, cb, 1.0)
    font_size = 18
    font_family = "JetBrains Mono Nerd Font"
    position = 0, 130
    halign = center
    valign = center
}
