# ~/.config/hypr/hyprlock.conf
# Hyprlock ‚Äď Catppuccin Mocha ‚Äď Dise√Īo Profesional & Ordenado
# Autor: T√ļ, con ayuda de Grok
source = $HOME/.config/hypr/ui/mocha.conf

$accent      = $mauve
$accentAlpha = $mauveAlpha
$font        = JetBrainsMono Nerd Font
$fontSans    = Inter Display, sans-serif

general {
    disable_loading_bar = false
    grace               = 3
    hide_cursor         = true
    ignore_empty_password = false
    no_fade_in          = false
    immediate_rendering = true
}

background {
    monitor =
    path = $HOME/.local/share/wallpapers/purple_leaves.png
    color = $base
    blur_passes = 0
}

image {
    monitor =
    path = $HOME/zhaleff/assets/image.jpg
    size = 100
    rounding = -1
    border_size = 4
    border_color = $accent
    position = 0, -20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 3
    dots_size = 0.22
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(30, 30, 46, 0.5)
    font_color = $text
    fade_on_empty = false
    rounding = 50
    placeholder_text = <i><span foreground="##$textAlpha">ůįĆĺ Logged in as </span><span foreground="##$accentAlpha">$USER</span></i>
    position = 0, 180
    halign = center 
    valign = bottom 
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 92
    font_family = $font
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B %Y"
    color = $subtext0
    font_size = 22
    font_family = $font
    position = 0, 130
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back, $USER
    color = $subtext1
    font_size = 20
    font_family = $fontSans
    position = 0, 80
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:5000] brightnessctl -m | cut -d, -f4 | tr -d '%' | awk '{printf "ůįÉě %s%%", $1}'
    color = $green
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 100, -120
    halign = center 
    valign = center 
}
label {
    monitor =
    text = cmd[update:3000] wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{if($3=="[MUTED]") print "ůįĚü OFF"; else printf "ůįēĺ %.0f%%", $2*100}'
    color = $teal
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = -100, -120 
    halign = center 
    valign = center 
}

label {
    monitor =
    text = cmd[update:2000] playerctl metadata --format '{{artist}} - {{title}}' 2>/dev/null || echo "No music"
    color = $green
    font_size = 15
    font_family = $font
    position = 0, 0
    halign = center 
    valign = bottom
}
on-lock {
    exec = playerctl --all-players pause
}

on-resume {
    exec = playerctl --all-players play
}
